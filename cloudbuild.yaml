steps:
  # 1. Install Dependencies for the frontend (root)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    id: 'Install Frontend Dependencies'

  # 2. Install Dependencies for the backend (server)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    dir: 'server'
    id: 'Install Backend Dependencies'

  # 3. Build the backend (run migrations and generate prisma client)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'gcp-build']
    dir: 'server'
    id: 'Build Backend'

  # 4. Build the React Application (frontend)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'REACT_APP_ENV=production'
    id: 'Build Frontend'

  # 5. Deploy to Firebase App Hosting
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--project', '$PROJECT_ID']
    id: 'Deploy'

# Save build artifacts (optional, for debugging)
artifacts:
  objects:
    location: 'gs://$PROJECT_ID-build-artifacts/'
    paths: ['build/**']

options:
  logging: CLOUD_LOGGING_ONLY
